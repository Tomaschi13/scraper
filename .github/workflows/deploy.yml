name: Deploy Scraper

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: scraper-deploy-main
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Scraper/package-lock.json
            runner/package-lock.json

      - name: Install Scraper test dependencies
        run: npm ci --prefix Scraper

      - name: Run Scraper test suite
        run: npm test --prefix Scraper

      - name: Install runner dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci --prefix runner

      - name: Run runner test suite
        run: npm test --prefix runner

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment:
      name: production
    env:
      SCRAPER_DEPLOY_HOST: 178.104.237.206
      SCRAPER_DEPLOY_PORT: 22
      SCRAPER_DEPLOY_USER: deploy
      SCRAPER_DEPLOY_RUNNER_PATH: /opt/runner
      SCRAPER_DEPLOY_EXTENSION_PATH: /opt/Scraper
      SCRAPER_DEPLOY_PLAYWRIGHT_BROWSERS_PATH: /opt/ms-playwright
      SCRAPER_DEPLOY_RESTART_COMMAND: sudo /usr/bin/systemctl restart scraper-portal
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deploy secret
        env:
          SCRAPER_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.SCRAPER_DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SCRAPER_DEPLOY_SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing required GitHub secret: SCRAPER_DEPLOY_SSH_PRIVATE_KEY"
            exit 1
          fi

      - name: Configure SSH
        env:
          SCRAPER_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.SCRAPER_DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SCRAPER_DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cp .github/known_hosts/scraper-production ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure remote deploy paths exist
        run: |
          set -euo pipefail
          ssh -p "$SCRAPER_DEPLOY_PORT" "$SCRAPER_DEPLOY_USER@$SCRAPER_DEPLOY_HOST" \
            "mkdir -p $(printf '%q' "$SCRAPER_DEPLOY_RUNNER_PATH") $(printf '%q' "$SCRAPER_DEPLOY_EXTENSION_PATH") $(printf '%q' "$SCRAPER_DEPLOY_PLAYWRIGHT_BROWSERS_PATH")"

      - name: Sync runner to server
        run: |
          set -euo pipefail
          rsync -rlz --delete \
            --exclude ".DS_Store" \
            --exclude "._*" \
            --exclude "node_modules/" \
            --exclude "coverage/" \
            --exclude "test-results/" \
            --exclude "*.log" \
            -e "ssh -p $SCRAPER_DEPLOY_PORT" \
            ./runner/ "$SCRAPER_DEPLOY_USER@$SCRAPER_DEPLOY_HOST:$SCRAPER_DEPLOY_RUNNER_PATH/"

      - name: Sync Scraper extension to server
        run: |
          set -euo pipefail
          rsync -rlz --delete \
            --exclude ".DS_Store" \
            --exclude "._*" \
            --exclude "node_modules/" \
            --exclude "coverage/" \
            --exclude "tests/" \
            --exclude "*.log" \
            -e "ssh -p $SCRAPER_DEPLOY_PORT" \
            ./Scraper/ "$SCRAPER_DEPLOY_USER@$SCRAPER_DEPLOY_HOST:$SCRAPER_DEPLOY_EXTENSION_PATH/"

      - name: Install runner deps and restart service
        run: |
          set -euo pipefail

          runner_path=$(printf '%q' "$SCRAPER_DEPLOY_RUNNER_PATH")
          browsers_path=$(printf '%q' "$SCRAPER_DEPLOY_PLAYWRIGHT_BROWSERS_PATH")
          restart_command=$(printf '%q' "$SCRAPER_DEPLOY_RESTART_COMMAND")

          ssh -p "$SCRAPER_DEPLOY_PORT" "$SCRAPER_DEPLOY_USER@$SCRAPER_DEPLOY_HOST" bash -s <<REMOTE
          set -euo pipefail
          export NODE_ENV=production
          export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
          export PLAYWRIGHT_BROWSERS_PATH=$browsers_path
          mkdir -p "\$PLAYWRIGHT_BROWSERS_PATH"

          cd $runner_path
          echo "Installing runner production dependencies..."
          npm ci --omit=dev

          echo "Ensuring Playwright Chromium is installed..."
          npx playwright install chromium

          echo "Restarting scraper-portal service..."
          $restart_command
          echo "Deploy complete."
          REMOTE
